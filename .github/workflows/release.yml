name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Stamp the release tag (v1.2.3 → 1.2.3) into package.json BEFORE building, so the static
      # `import pkg from './package.json'` baked into each binary reports the exact release version
      # in its User-Agent (drives CLI-usage analytics).
      - name: Stamp version from tag
        working-directory: packages/cli
        run: |
          v="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp)"
          jq --arg v "$v" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json

      - name: Build standalone binaries
        working-directory: packages/cli
        run: |
          mkdir -p dist
          while read -r target out; do
            bun build ./index.ts --compile --minify --target="$target" --outfile "dist/$out"
            # Checksum the uncompressed binary (what actually runs), then gzip to shrink the
            # download ~2-3x. The installer verifies the decompressed bytes against this sum.
            ( cd dist && shasum -a 256 "$out" | awk '{print $1}' > "$out.sha256" && gzip -9 "$out" )
          done <<'EOF'
          bun-darwin-arm64 glance-arm64-darwin
          bun-darwin-x64   glance-x64-darwin
          bun-linux-arm64  glance-arm64-linux
          bun-linux-x64    glance-x64-linux
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            packages/cli/dist/glance-*-*.gz
            packages/cli/dist/glance-*-*.sha256
          generate_release_notes: true
