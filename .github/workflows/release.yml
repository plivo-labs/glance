name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      # The CLI is a stdlib-only Go program. All 4 darwin/linux x arm64/x64 targets cross-compile
      # from this one runner via GOOS/GOARCH - no bun, no cross toolchain, no per-OS runners. Asset
      # names (glance-<arch>-<os>) + the gz + .sha256 contract match the old bun build exactly, so
      # install.sh and the CLI self-update path are unchanged.
      - name: Build standalone binaries
        working-directory: packages/cli
        run: |
          mkdir -p dist
          # Stamp the release tag (v1.2.3 -> 1.2.3) into the binary via -ldflags -X so it reports the
          # exact release version in its User-Agent (drives CLI-usage analytics) and self-update compare.
          v="${GITHUB_REF_NAME#v}"
          while read -r goos goarch out; do
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w -X main.version=$v" -o "dist/$out" .
            # Checksum the uncompressed binary (what actually runs), then gzip to shrink the download.
            # The installer + self-update verify the decompressed bytes against this sum.
            ( cd dist && shasum -a 256 "$out" | awk '{print $1}' > "$out.sha256" && gzip -9 "$out" )
          done <<'EOF'
          darwin arm64 glance-arm64-darwin
          darwin amd64 glance-x64-darwin
          linux  arm64 glance-arm64-linux
          linux  amd64 glance-x64-linux
          EOF

      - name: Publish release
        # Pinned to a full commit SHA (not the mutable @v3 tag): this action publishes the binaries +
        # .sha256 that install.sh and CLI self-update verify against, so a compromised tag re-point
        # could ship tampered artifacts that still "pass" their own checksums.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            packages/cli/dist/glance-*-*.gz
            packages/cli/dist/glance-*-*.sha256
          generate_release_notes: true
