name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo (it neither deploys nor comments). Denies the persisted
# GITHUB_TOKEN its default (often write) scope, which matters most for pull_request runs from forks.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pin bun (not `latest`) so CI is reproducible and never runs on an unvetted Bun release.
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Generates the gitignored worker-configuration.d.ts that typecheck depends on.
      - name: Generate Cloudflare types
        run: bun run cf-typegen

      - name: Typecheck
        run: bun run typecheck

      - name: Build web
        run: bun run build:web

      - name: Test
        run: bun test

      - name: Lint
        run: bun run lint

  # The CLI is a separate stdlib-only Go program (packages/cli) - build + test it on its own runner.
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26'
      - name: Vet + test
        working-directory: packages/cli
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt drift:"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...
      - name: Build sanity (all release targets)
        working-directory: packages/cli
        run: |
          for t in "darwin arm64" "darwin amd64" "linux arm64" "linux amd64"; do
            set -- $t
            CGO_ENABLED=0 GOOS="$1" GOARCH="$2" go build -o /dev/null . || exit 1
          done
