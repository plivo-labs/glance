name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Generates the gitignored worker-configuration.d.ts that typecheck depends on.
      - name: Generate Cloudflare types
        run: bun run cf-typegen

      - name: Typecheck
        run: bun run typecheck

      - name: Build web
        run: bun run build:web

      - name: Test
        run: bun test

      - name: Lint
        run: bun run lint

  # The CLI is a separate stdlib-only Go program (packages/cli) - build + test it on its own runner.
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Vet + test
        working-directory: packages/cli
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt drift:"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...
      - name: Build sanity (all release targets)
        working-directory: packages/cli
        run: |
          for t in "darwin arm64" "darwin amd64" "linux arm64" "linux amd64"; do
            set -- $t
            CGO_ENABLED=0 GOOS="$1" GOARCH="$2" go build -o /dev/null . || exit 1
          done
