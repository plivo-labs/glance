<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply the saved theme before first paint (no flash). Default: dark.
      (function () {
        try {
          var t = localStorage.getItem('glance-theme')
          document.documentElement.classList.toggle('dark', t !== 'light')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>Glance — Artifacts for every agent</title>
    <meta
      name="description"
      content="An open-source alternative to Claude Artifacts. Any coding agent ships a self-contained page or app to a live URL, then you review it in the browser and the agent fixes it. Self-hosted on Cloudflare."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
